services:
  - type: web
    runtime: docker
    name: grantscope-public-demo
    region: frankfurt
    plan: free
    branch: public-demo
    dockerfilePath: ./Dockerfile.public-demo
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: PUBLIC_DEMO_MODE
        value: "true"
      - key: DEMO_SEED_BUNDLE_PATH
        value: /app/sample-data/demo-tenant.zip
      - key: DEMO_SEED_SOURCE_NAME
        value: public-demo-northbridge.zip
      - key: DATABASE_URL
        fromDatabase:
          name: grantscope-public-demo-db
          property: connectionString

databases:
  - name: grantscope-public-demo-db
    region: frankfurt
    plan: free